name: CI / No project cache

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-without-project-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # The Nix installer may cache its own installer artifact, but no adapter
      # persists project store paths between runs.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3.21.7

      # Keep this identical to ci-magic-cache.yml so runtimes are comparable.
      - run: nix flake check --print-build-logs
